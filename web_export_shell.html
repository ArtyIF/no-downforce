<!DOCTYPE html>
<html lang="en">
	<head>
		<meta charset="utf-8">
		<meta name="viewport" content="width=device-width, user-scalable=no, initial-scale=1.0">
		<title>$GODOT_PROJECT_NAME</title>
		<style>
@font-face {
	font-family: 'Qaz';
	src: local('Qaz'), url('Qaz-Regular.otf');
}

html, body, #canvas {
	margin: 0;
	padding: 0;
	border: 0;
	font-size: 16px;
}

body {
	color: white;
	background-color: black;
	overflow: hidden;
	touch-action: none;
}

#canvas {
	display: block;
}

#canvas:focus {
	outline: none;
}

#status, #status-splash, #status-loading, #status-notice {
	position: absolute;
	left: 0;
	right: 0;
}

#status, #status-splash {
	top: 0;
	bottom: 0;
}

#status {
	background-color: #0d0906;
	display: flex;
	flex-direction: column;
	justify-content: center;
	align-items: center;
}

#status-splash {
	max-height: 100%;
	max-width: 100%;
	margin: auto;
}

#status-loading, #status-notice {
	display: none;
}

#status-loading {
	background-color: #1a120d;
	color: #ffb07f;
}

#status-notice {
	background-color: #ff6000;
	color: #1a120d;
}

#status-loading, #status-notice {
	font-family: 'Qaz', sans-serif;
	margin: 0 auto;
	top: calc(50vh + 130px);
	width: fit-content;
	overflow: hidden;
	padding: 10px 10px;
	text-align: center;
	z-index: 1;
}
		</style>
		$GODOT_HEAD_INCLUDE
	</head>
	<body>
		<canvas id="canvas">
			Your browser does not support the canvas tag.
		</canvas>

		<noscript>
			Your browser does not support JavaScript.
		</noscript>

		<div id="status">
			<img id="status-splash" src="index.png" alt="">
			<div id="status-loading">Downloading...</div>
			<div id="status-notice"></div>
		</div>

		<script src="$GODOT_URL"></script>
		<script>
const GODOT_CONFIG = $GODOT_CONFIG;
const GODOT_THREADS_ENABLED = $GODOT_THREADS_ENABLED;
const engine = new Engine(GODOT_CONFIG);

(function () {
	const statusOverlay = document.getElementById('status');
	const statusLoading = document.getElementById('status-loading');
	const statusNotice = document.getElementById('status-notice');

	let statusMode = '';

	function setStatusMode(mode) {
		if (statusMode === mode) {
			return;
		}
		if (mode === 'hidden') {
			statusOverlay.style.display = 'none';
			return;
		}
		statusOverlay.style.display = 'flex';
		statusLoading.style.display = mode === 'loading' ? 'block' : 'none';
		statusNotice.style.display = mode === 'notice' ? 'block' : 'none';
		statusMode = mode;
	}

	function setStatusNotice(text) {
		while (statusNotice.lastChild) {
			statusNotice.removeChild(statusNotice.lastChild);
		}
		const lines = text.split('\n');
		lines.forEach((line) => {
			statusNotice.appendChild(document.createTextNode(line));
			statusNotice.appendChild(document.createElement('br'));
		});
	}

	function setStatusLoading(text) {
		while (statusLoading.lastChild) {
			statusLoading.removeChild(statusLoading.lastChild);
		}
		const lines = text.split('\n');
		lines.forEach((line) => {
			statusLoading.appendChild(document.createTextNode(line));
			statusLoading.appendChild(document.createElement('br'));
		});
	}

	function displayFailureNotice(err) {
		console.error(err);
		if (err instanceof Error) {
			setStatusNotice(err.message);
		} else if (typeof err === 'string') {
			setStatusNotice(err);
		} else {
			setStatusNotice('An unknown error occurred.');
		}
		setStatusMode('notice');
	}

	const missing = Engine.getMissingFeatures({
		threads: GODOT_THREADS_ENABLED,
	});

	if (missing.length !== 0) {
		if (GODOT_CONFIG['serviceWorker'] && GODOT_CONFIG['ensureCrossOriginIsolationHeaders'] && 'serviceWorker' in navigator) {
			let serviceWorkerRegistrationPromise;
			try {
				serviceWorkerRegistrationPromise = navigator.serviceWorker.getRegistration();
			} catch (err) {
				serviceWorkerRegistrationPromise = Promise.reject(new Error('Service worker registration failed.'));
			}
			// There's a chance that installing the service worker would fix the issue
			Promise.race([
				serviceWorkerRegistrationPromise.then((registration) => {
					if (registration != null) {
						return Promise.reject(new Error('Service worker already exists.'));
					}
					return registration;
				}).then(() => engine.installServiceWorker()),
				// For some reason, `getRegistration()` can stall
				new Promise((resolve) => {
					setTimeout(() => resolve(), 2000);
				}),
			]).then(() => {
				// Reload if there was no error.
				window.location.reload();
			}).catch((err) => {
				console.error('Error while registering service worker:', err);
			});
		} else {
			// Display the message as usual
			const missingMsg = 'The following features required to run Godot projects on the Web are missing:\n';
			displayFailureNotice(missingMsg + missing.join('\n'));
		}
	} else {
		setStatusMode('loading');
		engine.startGame({
			'onProgress': function (current, total) {
				let currentMB = current / 1_000_000;
				let currentMBRounded = currentMB.toFixed(3);
				setStatusLoading(`Downloaded ${currentMBRounded} MB...`);
			},
			'onExit': function (status_code) {
				if (status_code !== 0) {
					displayFailureNotice(`Sorry, something went wrong. Refresh the page to restart. Code ${status_code}`);
				} else {
					setStatusNotice('Thank you for playing!');
					setStatusMode('notice');
				}
			},
			'mainPack': 'no-downforce.zip',
		}).then(() => {
			setStatusMode('hidden');
		}, displayFailureNotice);
	}
}());
		</script>
	</body>
</html>
